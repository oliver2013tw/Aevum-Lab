<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Aevum Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-main: 'JetBrains Mono', 'Noto Sans TC', monospace;
        }

        /* 基礎設置：防過度捲動 */
        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: var(--font-main);
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: #fff;
            overflow: hidden; 
            overscroll-behavior: none; /* 關鍵：防止手機端與 PakePlus 下拉回彈 */
        }

        /* 高科技背景感 */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 20%, #1a2a6c33, transparent),
                        radial-gradient(circle at 80% 80%, #b21f1f22, transparent);
            z-index: -1;
        }

        #app {
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 100%; padding: 20px;
        }

        /* 板塊優化：外框 90 度尖角，內件圓角 */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 0px; /* 依照要求：維持 90 度直角外框 */
            width: 100%; max-width: 420px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        h1 { font-size: 22px; font-weight: 700; letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase; color: var(--primary); }
        .subtitle { color: #666; font-size: 13px; margin-bottom: 30px; }

        /* 輸入框 */
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
        input {
            width: 100%; padding: 14px;
            background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
            border-radius: 0; color: #fff; font-size: 15px; outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: rgba(0,210,255,0.05); }

        /* 按鈕：依照要求，按鈕需有圓角 */
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 12px; /* 圓角按鈕 */
            font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.3s;
            margin-top: 10px; color: #fff;
        }
        .btn-primary { background: linear-gradient(135deg, var(--secondary), var(--primary)); box-shadow: 0 8px 15px rgba(0,210,255,0.2); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-ghost { background: transparent; border: 1px solid var(--glass-border); color: #888; font-size: 13px; margin-top: 20px; }

        /* 狀態列 */
        .status-bar { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: var(--primary); background: rgba(0,210,255,0.1); padding: 4px 12px; margin-bottom: 20px; }
        .dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 8px var(--primary); animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 驗證彈窗 Overlay */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        #overlay.active { display: flex; }
        .modal {
            background: #0d1117; border: 1px solid var(--primary);
            width: 85%; max-width: 350px; padding: 30px; text-align: center;
        }

        .hidden { display: none !important; }

        /* RWD 優化 */
        @media (max-width: 480px) {
            .card { border: none; height: 100vh; max-width: none; background: transparent; display: flex; flex-direction: column; justify-content: center; }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="view-login" class="card">
        <h1>Aevum Services</h1>
        <p class="subtitle">進入 Aevum 數據生態系</p>
        <div class="input-group">
            <label>Identification (Email)</label>
            <input type="email" id="email" placeholder="name@aevum.lab">
        </div>
        <div class="input-group">
            <label>Access Key (Password)</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" id="login-btn">驗證並登入</button>
        <button class="btn btn-ghost" id="mode-btn">切換至註冊模式</button>
    </div>

    <div id="view-dash" class="card hidden">
        <div class="status-bar"><div class="dot"></div>系統已就緒</div>
        <h1>控制中心</h1>
        <p id="user-mail" style="font-size: 14px; color: #aaa; margin-bottom: 30px;"></p>
        
        <div style="border-left: 2px solid var(--primary); padding-left: 15px; text-align: left; margin-bottom: 30px;">
            <p style="font-size: 12px; color: #555;">連線協定</p>
            <p style="font-size: 14px;">RTDB 實時同步中</p>
        </div>

        <button class="btn btn-primary" id="mock-btn" style="background: rgba(255,255,255,0.05); color: #fff;">發起模擬驗證請求</button>
        <button class="btn btn-ghost" id="logout-btn" style="border-color: rgba(255,75,43,0.3); color: #ff4b2b;">中斷所有連線並登出</button>
    </div>
</div>

<div id="overlay">
    <div class="modal">
        <h2 style="color: var(--primary); margin-bottom: 15px;">🛡️ 安全授權</h2>
        <p style="font-size: 14px; color: #888; line-height: 1.6;">偵測到來自 <b id="req-site" style="color: #fff;">系統外網</b> 的訪問請求，是否允許授權？</p>
        <button class="btn btn-primary" id="approve-btn" style="margin-top: 25px;">確認授權</button>
        <button class="btn btn-ghost" id="deny-btn">拒絕訪問</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getDatabase, ref, onValue, set, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // 兩組專案配置
    const cfgAuth = {
        apiKey: "AIzaSyBOAIyQgE1_IvtFPNbC9tHG9wwGwz1gO9E",
        authDomain: "aevum-auth.firebaseapp.com",
        databaseURL: "https://aevum-auth-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "aevum-auth"
    };

    const cfgServ = {
        apiKey: "AIzaSyAd_st_rjiXeuqvtOuh2ZTdVv0YDwkYsS0",
        authDomain: "aevum-services.firebaseapp.com",
        projectId: "aevum-services"
    };

    // 初始化
    const appA = initializeApp(cfgAuth, "A");
    const appS = initializeApp(cfgServ, "S");
    const auth = getAuth(appS); // 從 Services 登入
    const rtdb = getDatabase(appA); // 監聽 Auth 的 RTDB

    let curUID = null;
    let isLogin = true;

    // 核心監聽邏輯
    const startSync = (uid) => {
        onValue(ref(rtdb, `verification_requests/${uid}`), (snap) => {
            const data = snap.val();
            if (data && data.status === 'pending') {
                document.getElementById('req-site').textContent = data.site || "未授權站點";
                document.getElementById('overlay').classList.add('active');
            } else {
                document.getElementById('overlay').classList.remove('active');
            }
        });
        onDisconnect(ref(rtdb, `verification_requests/${uid}`)).remove();
    };

    // 狀態切換
    onAuthStateChanged(auth, (user) => {
        if (user) {
            curUID = user.uid;
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-dash').classList.remove('hidden');
            document.getElementById('user-mail').textContent = user.email;
            startSync(user.uid);
        } else {
            document.getElementById('view-login').classList.remove('hidden');
            document.getElementById('view-dash').classList.add('hidden');
            document.getElementById('overlay').classList.remove('active');
        }
    });

    // 事件監聽
    document.getElementById('login-btn').onclick = async () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        if(!e || !p) return alert("請完整填寫憑證");
        try {
            isLogin ? await signInWithEmailAndPassword(auth, e, p) : await createUserWithEmailAndPassword(auth, e, p);
        } catch (err) { alert("驗證失敗: " + err.message); }
    };

    document.getElementById('mode-btn').onclick = () => {
        isLogin = !isLogin;
        document.querySelector('#view-login h1').textContent = isLogin ? "Aevum Services" : "建立數位身份";
        document.getElementById('login-btn').textContent = isLogin ? "驗證並登入" : "立即註冊";
        document.getElementById('mode-btn').textContent = isLogin ? "切換至註冊模式" : "返回登入介面";
    };

    document.getElementById('logout-btn').onclick = () => signOut(auth);

    document.getElementById('approve-btn').onclick = () => 
        update(ref(rtdb, `verification_requests/${curUID}`), { status: 'approved', timestamp: Date.now() });

    document.getElementById('deny-btn').onclick = () => 
        update(ref(rtdb, `verification_requests/${curUID}`), { status: 'denied' });

    document.getElementById('mock-btn').onclick = () => 
        set(ref(rtdb, `verification_requests/${curUID}`), { 
            site: "Aevum Lab 內部測試", 
            status: "pending", 
            timestamp: Date.now() 
        });
</script>
</body>
</html>
