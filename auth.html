<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Aevum Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #00d2ff; --s: #3a7bd5; --bg: #05070a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --font: 'JetBrains Mono', 'Noto Sans TC', monospace;
        }

        /* 移除瀏覽器預設樣式與過度捲動 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font); -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: #fff; overflow: hidden; overscroll-behavior: none; }
        
        /* 抹除輸入框瀏覽器暗示 (Autofill 等) */
        input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus {
            -webkit-text-fill-color: #fff; -webkit-box-shadow: 0 0 0px 1000px #0d1117 inset; transition: background-color 5000s ease-in-out 0s;
        }

        #app { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; padding: 1.5rem; background-image: radial-gradient(circle at 10% 10%, #1a2a6c11, transparent), radial-gradient(circle at 90% 90%, #b21f1f11, transparent); }

        /* 容器：90度尖角 */
        .card {
            background: var(--glass); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border); border-radius: 0;
            width: 100%; max-width: 400px; padding: 2.5rem;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6); position: relative;
        }

        h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: 3px; margin-bottom: 0.5rem; color: var(--p); text-transform: uppercase; }
        .desc { color: #555; font-size: 0.75rem; margin-bottom: 2rem; letter-spacing: 1px; }

        /* UI 元件：圓角設計 */
        .field { margin-bottom: 1.25rem; text-align: left; }
        label { display: block; font-size: 0.65rem; color: #888; margin-bottom: 0.5rem; font-weight: 700; text-transform: uppercase; }
        input {
            width: 100%; padding: 0.85rem 1rem; background: rgba(255,255,255,0.02);
            border: 1px solid var(--border); border-radius: 10px; /* 內裝圓角 */
            color: #fff; font-size: 0.9rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input:focus { border-color: var(--p); background: rgba(0,210,255,0.05); box-shadow: 0 0 15px rgba(0,210,255,0.1); }

        .btn {
            width: 100%; padding: 0.85rem; border: none; border-radius: 10px; /* 按鈕圓角 */
            font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: 0.3s;
            margin-top: 0.5rem; color: #fff; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-p { background: linear-gradient(135deg, var(--s), var(--p)); }
        .btn-p:active { transform: scale(0.97); opacity: 0.8; }
        .btn-s { background: transparent; border: 1px solid var(--border); color: #888; font-size: 0.75rem; margin-top: 1.5rem; }

        /* 儀表板組件 */
        .status-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 0.65rem; color: var(--p); background: rgba(0,210,255,0.08); padding: 4px 10px; margin-bottom: 1.5rem; }
        .dot { width: 5px; height: 5px; background: var(--p); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 設定板塊 */
        .settings-panel { border-top: 1px solid var(--border); margin-top: 2rem; padding-top: 1.5rem; text-align: left; }

        /* 驗證彈窗 */
        #ov {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            display: none; justify-content: center; align-items: center; z-index: 9999;
        }
        #ov.active { display: flex; }
        .modal { background: #0a0d12; border: 1px solid var(--p); width: 85%; max-width: 320px; padding: 2rem; text-align: center; box-shadow: 0 0 50px rgba(0,210,255,0.2); }

        .hidden { display: none !important; }
        @media (max-width: 480px) { .card { height: 100%; max-width: none; border: none; display: flex; flex-direction: column; justify-content: center; background: transparent; } }
    </style>
</head>
<body>

<div id="app">
    <div id="v-auth" class="card">
        <h1>Aevum Auth</h1>
        <p class="desc">SECURE ACCESS PROTOCOL</p>
        <div class="field">
            <label>User Identity</label>
            <input type="email" id="email" autocomplete="off" placeholder="account@aevum.lab">
        </div>
        <div class="field">
            <label>Access Credential</label>
            <input type="password" id="password" autocomplete="off" placeholder="••••••••">
        </div>
        <button class="btn btn-p" id="act-btn">INITIALIZE LOGIN</button>
        <button class="btn btn-s" id="sw-btn">CREATE NEW IDENTITY</button>
    </div>

    <div id="v-dash" class="card hidden">
        <div class="status-tag"><div class="dot"></div> ENCRYPTED CONNECTION ACTIVE</div>
        <h1>Control Panel</h1>
        <p id="u-info" style="font-size: 13px; color: #555; margin-bottom: 2rem;"></p>
        
        <div class="settings-panel">
            <label>Profile Alias (Stored in Auth DB)</label>
            <div style="display: flex; gap: 10px; margin-bottom: 1.5rem;">
                <input type="text" id="u-alias" placeholder="用戶別名" style="font-size: 0.8rem; padding: 0.6rem;">
                <button class="btn btn-p" id="save-settings" style="width: 80px; margin: 0; font-size: 0.7rem; border-radius: 8px;">SAVE</button>
            </div>
            
            <label>Security Level</label>
            <p style="font-size: 0.75rem; color: var(--p);">Standard Aevum Multi-Factor</p>
        </div>

        <button class="btn btn-s" id="out-btn" style="color: #ff4b2b; border-color: rgba(255,75,43,0.2);">TERMINATE SESSION</button>
    </div>
</div>

<div id="ov">
    <div class="modal">
        <h2 style="font-size: 1rem; color: var(--p); margin-bottom: 1rem;">AUTHORIZATION</h2>
        <p style="font-size: 0.85rem; color: #888; line-height: 1.6; margin-bottom: 1.5rem;">檢測到來自 <b id="req-node" style="color: #fff;">...</b> 的連線請求，是否授權訪問？</p>
        <button class="btn btn-p" id="app-btn">ALLOW ACCESS</button>
        <button class="btn btn-s" id="den-btn">DENY</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getDatabase, ref, onValue, set, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.app.js";

    // 初始化雙專案
    const cA = {
        apiKey: "AIzaSyBOAIyQgE1_IvtFPNbC9tHG9wwGwz1gO9E",
        authDomain: "aevum-auth.firebaseapp.com",
        databaseURL: "https://aevum-auth-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "aevum-auth"
    };
    const cS = {
        apiKey: "AIzaSyAd_st_rjiXeuqvtOuh2ZTdVv0YDwkYsS0",
        authDomain: "aevum-services.firebaseapp.com",
        projectId: "aevum-services"
    };

    const appA = initializeApp(cA, "A");
    const appS = initializeApp(cS, "S");
    const auth = getAuth(appS);
    const rtdb = getDatabase(appA);

    let curUID = null;
    let isLogin = true;

    // --- 核心邏輯：帳號設定與請求監聽 ---
    const startSync = (uid) => {
        // 1. 監聽驗證請求
        onValue(ref(rtdb, `verification_requests/${uid}`), (s) => {
            const d = s.val();
            if (d && d.status === 'pending') {
                document.getElementById('req-node').textContent = d.site || "Unknown Source";
                document.getElementById('ov').classList.add('active');
            } else {
                document.getElementById('ov').classList.remove('active');
            }
        });

        // 2. 獲取帳號設定 (從 Auth RTDB)
        onValue(ref(rtdb, `user_settings/${uid}`), (s) => {
            const d = s.val();
            if (d && d.alias) {
                document.getElementById('u-alias').value = d.alias;
                document.querySelector('h1').textContent = `Welcome, ${d.alias}`;
            }
        });

        onDisconnect(ref(rtdb, `verification_requests/${uid}`)).remove();
    };

    // --- 介面控制 ---
    onAuthStateChanged(auth, (u) => {
        if (u) {
            curUID = u.uid;
            document.getElementById('v-auth').classList.add('hidden');
            document.getElementById('v-dash').classList.remove('hidden');
            document.getElementById('u-info').textContent = u.email;
            startSync(u.uid);
        } else {
            document.getElementById('v-auth').classList.remove('hidden');
            document.getElementById('v-dash').classList.add('hidden');
            document.getElementById('ov').classList.remove('active');
        }
    });

    // --- 按鈕動作 ---
    document.getElementById('act-btn').onclick = async () => {
        const e = document.getElementById('email').value, p = document.getElementById('password').value;
        if(!e || !p) return;
        try {
            isLogin ? await signInWithEmailAndPassword(auth, e, p) : await createUserWithEmailAndPassword(auth, e, p);
        } catch (err) { alert("Security Block: " + err.message); }
    };

    document.getElementById('save-settings').onclick = async () => {
        const alias = document.getElementById('u-alias').value;
        await update(ref(rtdb, `user_settings/${curUID}`), { alias, last_updated: Date.now() });
        alert("Settings Synchronized.");
    };

    document.getElementById('sw-btn').onclick = () => {
        isLogin = !isLogin;
        document.querySelector('#v-auth h1').textContent = isLogin ? "Aevum Auth" : "New Identity";
        document.getElementById('act-btn').textContent = isLogin ? "INITIALIZE LOGIN" : "REGISTER ACCOUNT";
    };

    document.getElementById('out-btn').onclick = () => signOut(auth);
    document.getElementById('app-btn').onclick = () => update(ref(rtdb, `verification_requests/${curUID}`), { status: 'approved', timestamp: Date.now() });
    document.getElementById('den-btn').onclick = () => update(ref(rtdb, `verification_requests/${curUID}`), { status: 'denied' });
</script>
</body>
</html>
