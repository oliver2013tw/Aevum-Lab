<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aevum Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #00f2fe; --s: #4facfe; --bg: #05070a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg);
            color: #fff; height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; overscroll-behavior: none;
            background-image: radial-gradient(circle at 50% -20%, #4facfe33, transparent 50%);
        }

        .container {
            width: 100%; max-width: 400px; padding: 2rem;
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 32px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            text-align: center; position: relative; z-index: 10;
        }

        h1 { font-weight: 700; font-size: 1.5rem; letter-spacing: -0.5px; margin-bottom: 0.5rem; }
        .desc { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }

        /* Form Controls */
        input {
            width: 100%; padding: 1rem; margin-bottom: 1rem;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 16px; color: #fff; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--p); background: rgba(255,255,255,0.1); }

        .btn {
            width: 100%; padding: 1rem; border-radius: 16px; border: none;
            font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-main { background: #fff; color: #000; }
        .btn-main:hover { transform: scale(1.02); background: var(--p); }
        .btn-ghost { background: transparent; color: #888; margin-top: 1rem; font-size: 0.85rem; }

        /* Dashboard */
        .status-pill {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 16px; background: rgba(0, 242, 254, 0.1);
            color: var(--p); border-radius: 100px; font-size: 0.75rem; font-weight: 600;
        }
        .pulse { width: 8px; height: 8px; background: var(--p); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Verification Overlay */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px); display: none;
            justify-content: center; align-items: center; z-index: 100;
        }
        #overlay.active { display: flex; }
        .modal {
            background: #111; padding: 2.5rem; border-radius: 32px;
            border: 1px solid var(--border); width: 85%; max-width: 340px; text-align: center;
        }

        .hidden { display: none !important; }

        @media (max-width: 480px) {
            .container { border-radius: 0; height: 100vh; max-width: none; border: none; background: transparent; display: flex; flex-direction: column; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="container" id="view-login">
    <h1>Aevum Auth</h1>
    <p class="desc">請使用 Aevum Services 帳號登入</p>
    <input type="email" id="email" placeholder="電子郵件">
    <input type="password" id="password" placeholder="密碼">
    <button class="btn btn-main" id="login-trigger">安全登入</button>
    <button class="btn btn-ghost" id="mode-trigger">註冊新帳號</button>
</div>

<div class="container hidden" id="view-dash">
    <div class="status-pill"><div class="pulse"></div>系統防護中</div>
    <h1 style="margin-top: 1.5rem;">連線正常</h1>
    <p class="desc" id="user-info"></p>
    
    <div style="height: 1px; background: var(--border); margin: 2rem 0;"></div>
    
    <button class="btn btn-main" style="background: rgba(255,255,255,0.05); color: #fff; margin-bottom: 0.8rem;" id="mock-trigger">模擬外部驗證請求</button>
    <button class="btn btn-ghost" id="logout-trigger" style="color: #ff4b2b;">登出系統</button>
</div>

<div id="overlay">
    <div class="modal">
        <div style="font-size: 2.5rem; margin-bottom: 1rem;">🛡️</div>
        <h2>驗證請求</h2>
        <p class="desc" style="margin: 1rem 0;">來自 <b id="req-site" style="color: #fff;">...</b> 的登入嘗試，是否允許？</p>
        <button class="btn btn-main" id="approve-trigger" style="background: var(--p);">授權登入</button>
        <button class="btn btn-ghost" id="deny-trigger">拒絕</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getDatabase, ref, onValue, set, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const cfgAuth = {
        apiKey: "AIzaSyBOAIyQgE1_IvtFPNbC9tHG9wwGwz1gO9E",
        authDomain: "aevum-auth.firebaseapp.com",
        databaseURL: "https://aevum-auth-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "aevum-auth",
        appId: "1:764527544507:web:09fd4a19f5ac6b3da3c19e"
    };

    const cfgServ = {
        apiKey: "AIzaSyAd_st_rjiXeuqvtOuh2ZTdVv0YDwkYsS0",
        authDomain: "aevum-services.firebaseapp.com",
        projectId: "aevum-services",
        appId: "1:323328565478:web:e87877ffba360b8be19b27"
    };

    const appA = initializeApp(cfgAuth, "A");
    const appS = initializeApp(cfgServ, "S");
    const authS = getAuth(appS);
    const rtdbA = getDatabase(appA);

    let curUID = null;
    let isLogin = true;

    // --- 監聽請求邏輯 ---
    const listenReq = (uid) => {
        onValue(ref(rtdbA, `verification_requests/${uid}`), (snap) => {
            const d = snap.val();
            if (d && d.status === 'pending') {
                document.getElementById('req-site').textContent = d.site;
                document.getElementById('overlay').classList.add('active');
            } else {
                document.getElementById('overlay').classList.remove('active');
            }
        });
        onDisconnect(ref(rtdbA, `verification_requests/${uid}`)).remove();
    };

    // --- UI 切換 ---
    onAuthStateChanged(authS, (u) => {
        if (u) {
            curUID = u.uid;
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-dash').classList.remove('hidden');
            document.getElementById('user-info').textContent = u.email;
            listenReq(u.uid);
        } else {
            document.getElementById('view-login').classList.remove('hidden');
            document.getElementById('view-dash').classList.add('hidden');
            document.getElementById('overlay').classList.remove('active');
        }
    });

    // --- 按鈕事件 ---
    document.getElementById('login-trigger').onclick = async () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        try {
            isLogin ? await signInWithEmailAndPassword(authS, e, p) : await createUserWithEmailAndPassword(authS, e, p);
        } catch (err) { alert(err.message); }
    };

    document.getElementById('mode-trigger').onclick = () => {
        isLogin = !isLogin;
        document.querySelector('#view-login h1').textContent = isLogin ? "Aevum Auth" : "建立帳號";
        document.getElementById('login-trigger').textContent = isLogin ? "安全登入" : "立即註冊";
        document.getElementById('mode-trigger').textContent = isLogin ? "註冊新帳號" : "返回登入";
    };

    document.getElementById('logout-trigger').onclick = () => signOut(authS);

    document.getElementById('approve-trigger').onclick = () => 
        update(ref(rtdbA, `verification_requests/${curUID}`), { status: 'approved', timestamp: Date.now() });

    document.getElementById('deny-trigger').onclick = () => 
        update(ref(rtdbA, `verification_requests/${curUID}`), { status: 'denied' });

    document.getElementById('mock-trigger').onclick = () => 
        set(ref(rtdbA, `verification_requests/${curUID}`), { site: "Aevum Marketplace", status: "pending", timestamp: Date.now() });
</script>
</body>
</html>
