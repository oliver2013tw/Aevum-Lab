<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Hub | System Overview</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* 基礎重置 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background-color: #050505;
      color: #ffffff;
      /* 防止手機端過度捲動 (Overscroll) */
      overscroll-behavior: none;
      height: 100vh;
      overflow: hidden;
      /* 高科技感微弱網格背景 */
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* 內部捲動容器 */
    .container {
      height: 100vh;
      overflow-y: auto;
      padding: 50px 20px;
      /* 隱藏原生滾動條以保持極簡 */
      scrollbar-width: none; 
      -ms-overflow-style: none;
    }
    .container::-webkit-scrollbar {
      display: none;
    }

    header {
      max-width: 1100px;
      margin: 0 auto 50px auto;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding-bottom: 20px;
      display: flex;
      align-items: center;
    }

    .status-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      background-color: #fff;
      margin-right: 15px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    h1 {
      font-size: 1.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
    }

    /* RWD 網格系統 */
    #app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 25px;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* 毛玻璃與銳角卡片設計 */
    .app-card {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 0; /* 嚴格 0 圓角 */
      padding: 30px;
      text-decoration: none;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: all 0.3s ease;
      overflow: hidden;
      z-index: 1;
    }

    /* 懸浮時的黑白反轉特效 */
    .app-card::before {
      content: '';
      position: absolute;
      top: 0; 
      left: 0;
      width: 0; 
      height: 100%;
      background: #ffffff;
      z-index: -1;
      transition: width 0.3s cubic-bezier(0.19, 1, 0.22, 1);
    }

    .app-card:hover {
      border-color: #ffffff;
      color: #000000;
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
    }

    .app-card:hover::before {
      width: 100%;
    }

    .app-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      padding-bottom: 15px;
      transition: border-color 0.3s ease;
    }

    .app-card:hover .app-title {
      border-bottom-color: rgba(0, 0, 0, 0.3);
    }

    .app-desc {
      font-size: 0.95rem;
      color: #a0a0a0;
      flex-grow: 1;
      margin-bottom: 25px;
      line-height: 1.6;
      transition: color 0.3s ease;
    }

    .app-card:hover .app-desc {
      color: #333333;
    }

    .app-meta {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 700;
    }

    /* 載入與錯誤狀態 */
    .system-msg {
      grid-column: 1 / -1;
      text-align: left;
      padding: 40px;
      font-size: 1.2rem;
      letter-spacing: 2px;
      border: 1px dashed rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <span class="status-indicator"></span>
      <h1>Master Hub // Application Portal</h1>
    </header>

    <div id="app-grid">
      <div class="system-msg" id="sys-msg">FETCHING_DATA_STREAM...</div>
    </div>
  </div>

  <script>
    const API_URL = 'https://api.sheety.co/faaf2cad729f66229c61ec33daf91164/appsData/工作表1';
    const grid = document.getElementById('app-grid');
    const sysMsg = document.getElementById('sys-msg');

    async function initializePortal() {
      try {
        const response = await fetch(API_URL);
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const json = await response.json();
        
        // 動態取得物件的第一個 key (解決 Sheety 可能將中文鍵值加上 s 的問題)
        const dataKey = Object.keys(json)[0];
        const appsData = json[dataKey];

        if (!appsData || appsData.length === 0) {
          grid.innerHTML = '<div class="system-msg">ERR: NO_RECORDS_FOUND</div>';
          return;
        }

        // 清除載入訊息
        grid.innerHTML = '';

        // 渲染應用清單
        appsData.forEach(app => {
          // 容錯處理：對應 Google Sheets 中可能的直行名稱 (中英文皆可)
          const name = app.name || app.名稱 || app.title || 'UNKNOWN_APP';
          const link = app.url || app.網址 || app.連結 || '#';
          const desc = app.description || app.描述 || 'No description data available in database.';
          const category = app.category || app.分類 || 'SYS_MODULE';

          const card = document.createElement('a');
          card.href = link;
          card.className = 'app-card';
          card.target = '_blank';
          card.rel = 'noopener noreferrer';
          
          card.innerHTML = `
            <div class="app-title">${name}</div>
            <div class="app-desc">${desc}</div>
            <div class="app-meta">[ ${category} ]</div>
          `;
          
          grid.appendChild(card);
        });

      } catch (error) {
        console.error('Core Connection Failed:', error);
        grid.innerHTML = '<div class="system-msg" style="color:#ff3333; border-color:#ff3333;">ERR: FETCH_SEQUENCE_FAILED</div>';
      }
    }

    // 啟動資料抓取
    initializePortal();
  </script>
</body>
</html>
